# Fail2Ban filter for WP fail2ban: Blocklist soft failures
# Generated for: v2.2.2
#

[INCLUDES]

before = common.conf

[Definition]

_daemon = (?:wordpress|wp)

failregex = ^%(__prefix_line)s\(WPf2b\+\+/blocklist\) Consider blocking connections from <HOST>$

ignoreregex =

